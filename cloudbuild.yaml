steps:
  # 1. Construir la imagen de Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/juego-serpiente:$COMMIT_SHA', '.']

  # 2. Subir la imagen a Container Registry (o Artifact Registry si lo configuras)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/juego-serpiente:$COMMIT_SHA']

  # 3. Desplegar en Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'juego-serpiente'
      - '--image'
      - 'gcr.io/$PROJECT_ID/juego-serpiente:$COMMIT_SHA'
      - '--region'
      - 'us-central1' # Cambia esto a tu región preferida si es diferente
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'

images:
  - 'gcr.io/$PROJECT_ID/juego-serpiente:$COMMIT_SHA'
